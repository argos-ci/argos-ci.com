name: Publish scheduled articles
permissions: {}

# Scheduled articles and changelog entries (publish date in the future) are
# excluded from the production build (see lib/api/blog.tsx and
# lib/api/changelog.tsx). This workflow runs daily and triggers a Vercel
# production deployment when content's publish date has elapsed but the
# content is not live yet.
#
# Requires the VERCEL_DEPLOY_HOOK_URL secret: create a Deploy Hook on the
# `main` branch in Vercel (Project Settings > Git > Deploy Hooks) and save
# its URL as a repository secret.

on:
  schedule:
    # Daily at 07:30 UTC.
    - cron: "30 7 * * *"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository code
        uses: actions/checkout@v6

      - name: Check for articles pending publication
        id: check
        run: node scripts/check-scheduled-articles.mjs >> "$GITHUB_OUTPUT"

      - name: Trigger Vercel production deployment
        if: steps.check.outputs.pending == 'true'
        run: curl --silent --show-error --fail -X POST "$VERCEL_DEPLOY_HOOK_URL"
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
